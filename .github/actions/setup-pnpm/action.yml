# This action will set up Node and then install pnpm dependencies, which might be restored from cache if available.
# In case of a cache miss, pnpm dependencies will be installed and later be stored in the "post step" of actions/cache.
---
name: Setup pnpm
description: Setup Node and install pnpm
runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: "./ui/package.json"

    - name: Install PNPM
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      with:
        run_install: false
        package_json_file: "./ui/package.json"

    - id: cache-key
      shell: bash
      run: |
        # Cache restore have some surprising relative pathing behavior we need
        # to deal with. When actions/cache restores something it does it
        # realtive to the check working directory. Since that can be different
        # depending on our self-hosted vs Github hosted runners
        #   /home/runner/actions-runner/_work vs. /home/runner/work
        # we need to factor in the absolute path of our working directory in our
        # cache key. If we don't then cache restores will be incompatible on one
        # or the other runner.
        #
        # See: https://github.com/actions/cache/issues/1127
        wd_hash=$(realpath . | sha256sum | head -c 8)
        echo "PNPM_STORE_CACHE_KEY=pnpm-store-${wd_hash}-${{ hashFiles('pnpm-lock.yaml') }}" >> "$GITHUB_OUTPUT"
    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.local/share/pnpm/store
        key: ${{ steps.cache-key.outputs.PNPM_STORE_CACHE_KEY }}

    - name: Install UI dependencies
      working-directory: ./ui
      shell: bash
      run: |
        pnpm i
        pnpm rebuild node-sass
