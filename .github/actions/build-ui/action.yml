---
name: Build UI
description: |
  Build the Vault Web UI assets and cache the results.

inputs:
  github-token:
    description: An elevated Github token to access private dependencies if necessary.
    default: ""

outputs:
  cache-key:
    description: "The cache key for the built UI assets (format: ui-<git-hash>)"
    value: ${{ steps.ui-hash.outputs.cache-key }}
  cache-hit:
    description: "Whether the UI was restored from cache (true) or built fresh (false)"
    value: ${{ steps.cache-ui-assets.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Get UI hash
      id: ui-hash
      shell: bash
      run: |
        ui_hash=$(git ls-tree HEAD ui --object-only)
        echo "cache-key=ui-${ui_hash}" | tee -a "$GITHUB_OUTPUT"
    - name: Set up UI asset cache
      id: cache-ui-assets
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        enableCrossOsArchive: true
        lookup-only: true
        path: http/web_ui
        # Only restore the UI asset cache if we haven't modified anything in the ui directory.
        # Never do a partial restore of the web_ui if we don't get a cache hit.
        key: ${{ steps.ui-hash.outputs.cache-key }}
    - name: Set up node
      if: ${{ steps.cache-ui-assets.outputs.cache-hit != 'true' }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: ui/package.json
    - name: Install PNPM
      if: ${{ steps.cache-ui-assets.outputs.cache-hit != 'true' }}
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      with:
        run_install: false
        package_json_file: "./ui/package.json"
    - id: cache-key
      shell: bash
      run: |
        # Cache restore have some surprising relative pathing behavior we need
        # to deal with. When actions/cache restores something it does it
        # realtive to the check working directory. Since that can be different
        # depending on our self-hosted vs Github hosted runners
        #   /home/runner/actions-runner/_work vs. /home/runner/work
        # we need to factor in the absolute path of our working directory in our
        # cache key. If we don't then cache restores will be incompatible on one
        # or the other runner.
        #
        # See: https://github.com/actions/cache/issues/1127
        wd_hash=$(realpath . | sha256sum | head -c 8)
        echo "PNPM_STORE_CACHE_KEY=pnpm-store-${wd_hash}-${{ hashFiles('pnpm-lock.yaml') }}" >> "$GITHUB_OUTPUT"
    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      if: ${{ steps.cache-ui-assets.outputs.cache-hit != 'true' }}
      with:
        path: ~/.local/share/pnpm/store
        key: ${{ steps.cache-key.outputs.PNPM_STORE_CACHE_KEY }}
    - name: Build UI
      if: ${{ steps.cache-ui-assets.outputs.cache-hit != 'true' }}
      shell: bash
      run: make ci-build-ui
