regions:
  # REGION replaced in CI
  - REGION

# A blocklist must exist for the tool to run so we set it to a non-existant
# account.
blocklist:
 - 1234567890

accounts:
  # replaced in CI
  ACCOUNT_NUM:
    presets:
      - default
      - olderthan
      - honeybee
      - enos
      - wiz

settings:
  EC2Instance:
    DisableStopProtection: true
    DisableDeletionProtection: true
  RDSInstance:
    DisableDeletionProtection: true

presets:
  default:
    # Ignores default VPC resources
    filters:
      # NOTE: These values are strings not bools so they must stay quoted
      EC2VPC:
        - property: IsDefault
          value: "true"
      EC2RouteTable:
        - property: DefaultVPC
          value: "true"
      EC2DHCPOption:
        - property: DefaultVPC
          value: "true"
      EC2InternetGateway:
        - property: DefaultVPC
          value: "true"
      EC2Subnet:
        - property: DefaultVPC
          value: "true"
      EC2InternetGatewayAttachment:
        - property: DefaultVPC
          value: "true"

  olderthan:
    # Filters resources by age (when available)
    # TIME_LIMIT replaced in CI
    filters:
      EC2Instance:
        - type: dateOlderThanNow
          property: LaunchTime
          value: -TIME_LIMIT
          invert: true
      ELBv2:
        - type: dateOlderThanNow
          property: CreatedTime
          value: -TIME_LIMIT
          invert: true
      IAMUser:
        - type: dateOlderThanNow
          property: CreateDate
          value: -TIME_LIMIT
          invert: true
      IAMInstanceProfile:
        - type: dateOlderThanNow
          # Instance profiles don't record a create time
          # The enos/modules/target_ec2_instances module will set this tag for us
          property: tag:CreateTime
          value: -TIME_LIMIT
          invert: true
      IAMInstanceProfileRole:
        - type: dateOlderThanNow
          property: role:CreateDate
          value: -TIME_LIMIT
          invert: true
      IAMRole:
        - type: dateOlderThanNow
          property: CreateDate
          value: -TIME_LIMIT
          invert: true
      IAMRolePolicyAttachment:
        - type: dateOlderThanNow
          property: RoleCreateDate
          value: -TIME_LIMIT
          invert: true
      IAMUserAccessKey:
        - type: dateOlderThanNow
          property: CreateDate
          value: -TIME_LIMIT
          invert: true
      RDSInstance:
        - type: dateOlderThanNow
          property: InstanceCreateTime
          value: -TIME_LIMIT
          invert: true

  honeybee:
    # Cloudsec
    filters:
      IAMRole:
        - property: tag:hc-config-as-code
          value: "honeybee"
        - property: Name
          type: glob
          value: "vault-assumed-role-credentials-demo"
      IAMRolePolicy:
        - property: tag:role:hc-config-as-code
          value: "honeybee"
        - property: role:RoleName
          type: glob
          value: "vault-assumed-role-credentials-demo"
      IAMRolePolicyAttachment:
        - property: tag:role:hc-config-as-code
          value: "honeybee"
        - property: Name
          type: glob
          value: "vault-assumed-role-credentials-demo"

  enos:
    # Existing CI to be cleaned up later
    filters:
      LambdaFunction:
        - property: Name
          value: "enos_cleanup"
      IAMRole:
        - property: Name
          type: glob
          value: "github_actions-*"
        - property: Name
          value: "rds-monitoring-role"
      IAMRolePolicy:
        - property: role:RoleName
          type: glob
          value: "github_actions*"
        - property: role:RoleName
          type: glob
          value: "rds-*"
      IAMRolePolicyAttachment:
        - "rds-monitoring-role -> AmazonRDSEnhancedMonitoringRole"
      IAMUser:
        - type: glob
          value: github_actions-vault_*
      IAMUserAccessKey:
        - property: UserName
          type: glob
          value: github_actions-vault_*
      IAMUserPolicy:
        - "github_actions-vault_ci -> AssumeServiceUserRole"
        - "github_actions-vault_enterprise_ci -> AssumeServiceUserRole"

  wiz:
    filters:
      __global__:
        - property: tag:wiz
          value: "auto-gen-cmk"
      EC2Snapshot:
        - property: Description
          type: glob
          value: '*Wiz*'
      KMSAlias:
        - property: Name
          type: glob
          value: "alias/wizKey"

